name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  test-infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Docker Services
        run: |
          cp .env.example .env
          echo "OPENAI_API_KEY=sk-dummy-key-for-ci" >> .env
          echo "CI=true" >> .env
          docker compose up -d --build --wait

      - name: Verify Service Health Status
        run: |
          NON_HEALTHY=$(docker compose ps --format json | jq -s -r '.[] | select(.State != "running" or (.Health != "" and .Health != "healthy")) | "\(.Service) - State: \(.State), Health: \(.Health)"')
          
          if [ ! -z "$NON_HEALTHY" ]; then
            echo "Error: The following services are not fully healthy or running:"
            echo "$NON_HEALTHY"
            docker compose ps
            exit 1
          fi
          echo "All services verified healthy and running."

      - name: Check Service Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Tear down Docker Services
        if: always()
        run: docker compose down -v